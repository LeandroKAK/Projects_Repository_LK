<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 14 - HTML - Formulários</title>
</head>
<body>
    <h1>Exeplo 14 - HTML formulários - elementos input</h1>
    <form action="paginadestino.php" method="get">
        <FIELdset>
            <legend>Exemplo 14 Formulários</legend>
            <div>
                <label for="">Nome</label>
                <input type="text" name="txtNome" id="txtNome" required>
            </div>
            <div>
                <label for="">Selecione uma cor</label>
                <input type="color" name="txtCor" id="txtCor">
            </div>
            <div>
                <label for="">Digite o ano do seu nascimento</label>
                <input type="number" name="txtAnoNascimento" id="txtAnoNascimento" required min = "1900" max = "2050" step = "1">
            </div>
            <div>
                <label for="">Ano do nascimento usando o componente range</label>
                <input type="range" name="txtAnoNascimentoRange" id="txtAnoNascimentoRange" required min = "1900" max = "2050" step = "10">
            </div>
            <div>
                <label for="">Digite o Horário do  seu compromisso</label>
                <input type="time" name="txtHorarioCompromisso" id="txtHorarioCompromisso">
            </div>
            <button type="submit">Enviar</button>
        </FIELdset>
    </form>
</body>
</html>
