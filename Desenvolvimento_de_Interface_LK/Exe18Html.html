<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18 - <HTML></HTML></title>
</head>
<body>
    <h1>Exercício 18 - Preferências do Aluno</h1>
    <form action="paginadestino.php" method="get">
        <fieldset>
            <legend>Preferências do Aluno</legend>
            <div>
                <label for="txtNome">Nome</label>
                <input type="text" name="txtNome" id="txtNome">
            </div>
            <div>
                <label for="txtCorFavorita">Selecione sua cor favorita</label>
                <input type="color" name="txtCorFavorita" id="txtCorFavorita">
            </div>
            <div>
                <label>Disciplinas de interesse:</label>
                <input type="checkbox" name="chkDisciplinaMatematica" id="chkDisciplinaMatematica" value="matematica">
                <label for="chkDisciplinaMatematica">Matemática</label>
                
                <input type="checkbox" name="chkDisciplinaProgramacao" id="chkDisciplinaProgramacao" value="programacao">
                <label for="chkDisciplinaProgramacao">Programação</label>
                
                <input type="checkbox" name="chkDisciplinaDesign" id="chkDisciplinaDesign" value="design">
                <label for="chkDisciplinaDesign">Design</label>
            </div>
            <div>
                <label>Turno preferido:</label>
                <input type="radio" name="radTurno" id="radTurnoManha" value="manha">
                <label for="radTurnoManha">Manhã</label>
                
                <input type="radio" name="radTurno" id="radTurnoTarde" value="tarde">
                <label for="radTurnoTarde">Tarde</label>
                
                <input type="radio" name="radTurno" id="radTurnoNoite" value="noite">
                <label for="radTurnoNoite">Noite</label>
            </div>
            <div>
                <label for="selCursoFavorito">Curso favorito</label>
                <select name="selCursoFavorito" id="selCursoFavorito">
                    <option value="frontend">Desenvolvimento Front-end</option>
                    <option value="backend">Desenvolvimento Back-end</option>
                    <option value="dados">Ciência de Dados</option>
                </select>
            </div>
            <div>
                <label for="txtNivelHtml">Nível de interesse em HTML usando o componente range</label>
                <input type="range" name="txtNivelHtml" id="txtNivelHtml" min="1" max="10" step="1">
            </div>
            <button type="submit">Enviar</button>
        </fieldset>
    </form>
</body>
</html>
