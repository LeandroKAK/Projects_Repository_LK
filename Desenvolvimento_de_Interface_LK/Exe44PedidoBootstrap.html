    <title>Exercicio 44 bootstrap - Sistema de vendas - Pedido</title>

<body>
    <div class="container-sm">
        <div class="card mt-4">
            <div class="card-header bg-primary text-white">
                Pedido
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6">
                        <label for="">ID do Funcionario</label>
                        <input type="text" name="" id="" class="form-control">
                    </div>
                    <div class="col-6">
                        <label for="">ID do Cliente</label>
                        <input type="text" name="" id="" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <label for="">Data do pedido</label>
                        <input type="date" name="" id="" class="form-control">
                    </div>
                    <div class="col-6">
                        <label for="">Valor total</label>
                        <input type="number" name="" id="" class="form-control" min="0">
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <div class="row">
                    <div class="col-4">
                        <button type="button" class="btn btn-primary form-control">Registrar</button>
                    </div>
                    <div class="col-4">
                        <button type="button" class="btn btn-primary form-control">Listar</button>
                    </div>
                    <div class="col-4">
                        <button type="button" class="btn btn-primary form-control">Sair</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
