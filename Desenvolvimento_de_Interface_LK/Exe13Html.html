<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13 prático HTML</title>
</head>

<body>
    <h1>Formulário</h1>
    <form action="paginadestino.com" method="get"></form>
    <fieldset>
        <legend>Dados Pessoais</legend>
        <div>
            <label for="">Nome: </label>
            <input type="text" name="txtNome" id="txtNome">
        </div>
        <div>
            <label for="">Endereço: </label>
            <input type="text" name="txtEndereço" id="txtEndereço">
        </div>
        <div>
            <label for="">Cidade: </label>
            <input type="text" name="txtCidade" id="txtCidade">
        </div>
        <div>
            <label for="">Estado:</label>
            <select name="cboEstadoCivil" id="cboEstadoCivil">
                <option value="1">São Paulo</option>
                <option value="2">DF</option>
                <option value="3">Rio de Janeiro</option>
                <option value="4">Mato Grosso</option>
                <option value="5">Manaus</option>
                <option value="6">Outros</option>
            </select>
        </div>
    </fieldset>
    <fieldset>
        <legend>Dados profissionais</legend>
        <div>
            <label for="">Natureza do Cargo </label><br>
            <input type="radio" name="rdCargo" id="rdCargo" value="1"> Gerência
            <input type="radio" name="rdCargo" id="rdCargo" value="2"> Financeiro
            <input type="radio" name="rdCargo" id="rdCargo" value="3"> Recepção
            <input type="radio" name="rdCargo" id="rdCargo" value="4"> Administrativo
            <input type="radio" name="rdCargo" id="rdCargo" value="5"> Juridico 
        </div>
        <br>
        <div>
            <label for="">Área de Interesse </label><br>
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="1"> Computação
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="2"> Biologia
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="3"> Meio Ambiente
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="4"> Engenharia
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="5"> História
        </div>
        <br>
        <div>
            <label for="">Mini-currículo</label>
            <textarea name="txtaMiniCurriculo" id="txtaMiniCurriculo"></textarea>
        </div>
    </fieldset>
    <br>
    <div>
        <button type="submit">Enviar</button>
    </div>
</body>
</html>
