<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 16 HTML</title>
</head>
<body>
    <h1>Exemplo 16 - HTML Formulários</h1>
    <form action="" method="post">
        <div>
            <label for="">Nome</label>
            <input type="text" name="" id="">
        </div>
        <div>
            <label for="">Digite o ano do nascimento</label>
            <input type="number" name="" id="" autofocus required> 
        </div>
        <div>
            <label for="">Digite uma data anterior a 31/03/2026</label>
            <input type="date" name="" id="" max="2026-03-31">
        </div>
        <div>
            <label for="">Digite uma data superior a 31/03/2026</label>
            <input type="date" name="" id="" min="2026-03-31">
        </div>
        <div>
            <label for="">Digite um texto de ate 100 caracteres</label><br>
            <textarea name="" id="" cols="80" rows="30" maxlength="100">

            </textarea>
        </div>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
