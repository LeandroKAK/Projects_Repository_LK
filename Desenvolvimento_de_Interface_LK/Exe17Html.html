<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 17 - HTML</title>
</head>
<body>
    <h1>Exercício 17 - Cadastro Pessoal</h1>
    <form action="paginadestino.php" method="get">
        <fieldset>
            <legend>Cadastro Pessoal</legend>
            <div>
                <label for="txtNomeCompleto">Nome Completo</label>
                <input type="text" name="txtNomeCompleto" id="txtNomeCompleto" required placeholder="Digite seu nome completo">
            </div>
            <div>
                <label for="txtEmail">E-mail</label>
                <input type="email" name="txtEmail" id="txtEmail" required placeholder="exemplo@email.com">
            </div>
            <div>
                <label for="txtAnoNascimento">Ano do seu nascimento</label>
                <input type="number" name="txtAnoNascimento" id="txtAnoNascimento" min="1900" max="2026" step="1">
            </div>
            <div>
                <label for="txtDataNascimento">Data de nascimento</label>
                <input type="date" name="txtDataNascimento" id="txtDataNascimento">
            </div>
            <div>
                <label for="txtHorarioEstudo">Horário preferido de estudo</label>
                <input type="time" name="txtHorarioEstudo" id="txtHorarioEstudo">
            </div>
            <button type="submit">Enviar</button>
        </fieldset>
    </form>
</body>
</html>
